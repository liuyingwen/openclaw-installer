name: Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/openclaw-gocache
      GOMODCACHE: /tmp/openclaw-gomodcache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: bash scripts/test-install-latest.sh

      - name: Test Windows bootstrap script
        shell: pwsh
        run: ./scripts/test-install-latest.ps1

      - name: Run Go tests
        run: go test ./...

      - name: Build release binaries
        run: ./scripts/build-release.sh

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > openclaw-installer-checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/* --clobber
          else
            gh release create "${TAG_NAME}" dist/* \
              --title "${TAG_NAME}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi
